<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YehnTrades — The Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080808;
    color: #e0d4b8;
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  /* HEADER */

  .brand-sub {
    font-size: 10px;
    letter-spacing: 5px;
    color: #3a3020;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* PAIR INPUT */
  .pair-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 28px;
    position: relative;
  }

  .pair-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: #4a4030;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .pair-input {
    width: 100%;
    background: #0d0b08;
    border: 1px solid #2a2010;
    border-radius: 6px;
    padding: 12px 16px;
    color: #c9a84c;
    font-size: 16px;
    font-family: Georgia, serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }

  .pair-input:focus { border-color: #c9a84c40; }
  .pair-input::placeholder { color: #2a2010; letter-spacing: 3px; }

  /* BUY / SELL TOGGLE */
  .side-toggle {
    display: flex;
    border: 1px solid #2a2010;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
    width: 100%;
    max-width: 480px;
  }

  .side-btn {
    flex: 1;
    padding: 14px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 4px;
    font-family: Georgia, serif;
    transition: all 0.2s;
    color: #3a3020;
  }

  .side-btn.buy.active  { background: rgba(92,184,92,0.12);  color: #5cb85c; }
  .side-btn.sell.active { background: rgba(224,92,92,0.12);  color: #e05c5c; }

  /* CARDS */
  .card {
    width: 100%;
    max-width: 480px;
    background: #0d0b08;
    border: 1px solid #2a2010;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .card-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid #1a1508;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .card-title { font-size: 10px; letter-spacing: 4px; color: #5a5040; text-transform: uppercase; }
  .card-hint  { font-size: 10px; color: #2a2418; font-style: italic; }

  /* STEPS */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 15px 20px;
    border-bottom: 1px solid #111008;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item.checked    { background: #0a0c08; }

  .num {
    font-size: 11px;
    color: #3a3020;
    min-width: 18px;
    padding-top: 3px;
    flex-shrink: 0;
  }

  .check-item.checked .num { color: #1e1c14; }

  .check-text {
    flex: 1;
    font-size: 14px;
    color: #a09070;
    line-height: 1.55;
    transition: all 0.15s;
  }

  .check-item.checked .check-text { color: #2a2618; text-decoration: line-through; }

  .box {
    width: 22px; height: 22px;
    border-radius: 4px;
    border: 1.5px solid #2a2418;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .buy  .box.ticked { border-color: #5cb85c; background: rgba(92,184,92,0.15); }
  .sell .box.ticked { border-color: #e05c5c; background: rgba(224,92,92,0.15); }

  .tick { display: none; font-size: 13px; }
  .buy  .box.ticked .tick { display: block; color: #5cb85c; }
  .sell .box.ticked .tick { display: block; color: #e05c5c; }

  /* NON-NEGOTIABLES */
  .nn-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid #111008;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.15s;
  }

  .nn-item:last-child { border-bottom: none; }

  .nn-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #2a2418;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .nn-item.blocked .nn-dot { background: #e05c5c; box-shadow: 0 0 6px rgba(224,92,92,0.45); }

  .nn-text {
    flex: 1;
    font-size: 13px;
    color: #5a5038;
    line-height: 1.5;
    transition: color 0.15s;
  }

  .nn-item.blocked .nn-text { color: #e05c5c; }

  .nn-x { font-size: 14px; color: transparent; font-weight: 700; transition: color 0.15s; min-width: 14px; text-align: right; }
  .nn-item.blocked .nn-x { color: #e05c5c; }

  /* STATUS */
  .status {
    width: 100%;
    max-width: 480px;
    border-radius: 8px;
    padding: 18px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s;
    margin-bottom: 14px;
  }

  .blocked-st { background: rgba(224,92,92,0.06); border: 1px solid #3a1010; color: #e05c5c; }
  .waiting-st { background: #0d0b08; border: 1px solid #1a1508; color: #2e2a1e; }
  .ready-buy  { background: rgba(92,184,92,0.06); border: 1px solid #1a3a1a; color: #5cb85c; }
  .ready-sell { background: rgba(224,92,92,0.06); border: 1px solid #3a1a1a; color: #e05c5c; }

  /* RESET */
  .reset-btn {
    width: 100%;
    max-width: 480px;
    padding: 12px;
    background: none;
    border: 1px solid #1a1508;
    border-radius: 6px;
    color: #2a2418;
    cursor: pointer;
    font-size: 9px;
    letter-spacing: 4px;
    font-family: Georgia, serif;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-bottom: 44px;
  }

  .reset-btn:hover { border-color: #3a3020; color: #5a5040; }

  /* FOOTER */
  .footer {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 20px;
    border-top: 1px solid #141008;
  }

  .footer-brand { font-size: 10px; letter-spacing: 4px; color: #2a2418; }
  .footer-rule  { font-size: 11px; color: #c9a84c; font-style: italic; font-weight: bold; letter-spacing: 2px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: #0d0b08;
    border: 1px solid #1a3a1a;
    color: #5cb85c;
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .logo {
    width: 200px;
    max-width: 60vw;
    margin-bottom: 4px;
    mix-blend-mode: lighten;
  }

  .logo-sm {
    width: 80px;
    mix-blend-mode: lighten;
  }

.nav-link{
  font-size:9px;
  letter-spacing:3px;
  color:#c9a84c;
  text-transform:uppercase;
  text-decoration:none;
  margin-top:40px;
  margin-bottom:28px;
  transition:color .2s;
}
.nav-link:hover{
  color:#e0c87a;
}


/* --- YehnTrades UI polish upgrade --- */

.card {
  box-shadow:
    0 8px 22px rgba(0,0,0,0.55),
    0 0 12px rgba(230,200,116,0.08);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow:
    0 12px 28px rgba(0,0,0,0.6),
    0 0 18px rgba(230,200,116,0.12);
}

.check-item:hover {
  background: #121008;
}

.check-item:active {
  transform: scale(0.985);
  background: #111008;
}

.tick {
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.15s ease, transform 0.15s ease;
}

.check-item.checked .tick {
  opacity: 1;
  transform: scale(1);
}

.check-text {
  color: #e6c874 !important;
}


/* Exit navigation button */
.exit-button{
  display:block;
  width:100%;
  max-width:480px;
  margin-top:32px;
  padding:14px;
  text-align:center;
  text-decoration:none;
  font-family:Georgia, serif;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#f0d98a;
  border:1px solid #2a2010;
  border-radius:8px;
  background:#0d0b08;
  transition:all .2s ease;
}

.exit-button:hover{
  background:#121008;
  border-color:#e6c874;
  box-shadow:0 0 12px rgba(230,200,116,0.15);
  transform:translateY(-1px);
}

</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA   <span class="footer-rule">No trigger. No trade.</span>
</div>

<div id="toast">✓ SAVED</div>

<script>
const SETUPS = {
  buy: {
    title: 'Setup — Buys',
    steps: [
      'Price broke a swing high on HTF',
      'Pulls back to origin of that swing',
      'M15 now aligns with HTF direction',
      'Enter — stop below the swing low',
    ],
    readyMsg: '✓ ENTRY VALID — BUY',
    readyClass: 'ready-buy',
  },
  sell: {
    title: 'Setup — Sells',
    steps: [
      'Price broke a swing low on HTF',
      'Pulls back to origin of that swing',
      'M15 now aligns with HTF direction',
      'Enter — stop above the swing high',
    ],
    readyMsg: '✓ ENTRY VALID — SELL',
    readyClass: 'ready-sell',
  },
};

const NN = [
  'I am chasing price',
  'I am tired or frustrated',
  'There is no clear trigger',
];

// ── PERSISTENCE ───────────────────────────────────────────────
function save(k, v) { try { localStorage.setItem('yt_' + k, JSON.stringify(v)); } catch(e){} }
function load(k, d) { try { const v = localStorage.getItem('yt_' + k); return v !== null ? JSON.parse(v) : d; } catch(e){ return d; } }

let side    = load('side', 'buy');
let steps   = load('steps_' + side, [false,false,false,false]);
let blocked = load('blocked', [false,false,false]);
let pair    = load('pair', '');

// ── INIT UI ───────────────────────────────────────────────────
document.getElementById('pair-input').value = pair;

function savePair(val) {
  pair = val.toUpperCase();
  save('pair', pair);
  showToast();
}

function setSide(s) {
  side  = s;
  steps = load('steps_' + s, [false,false,false,false]);
  save('side', s);
  render();
  showToast();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const setup = SETUPS[side];

  document.getElementById('btn-buy').className  = 'side-btn buy'  + (side === 'buy'  ? ' active' : '');
  document.getElementById('btn-sell').className = 'side-btn sell' + (side === 'sell' ? ' active' : '');
  document.getElementById('steps-title').textContent = setup.title;

  document.getElementById('steps-list').innerHTML = setup.steps.map((s, i) => `
    <div class="check-item ${side} ${steps[i] ? 'checked' : ''}" onclick="toggleStep(${i})">
      <span class="num">${i + 1}</span>
      <span class="check-text">${s}</span>
      <div class="box ${steps[i] ? 'ticked' : ''}"><span class="tick">✓</span></div>
    </div>
  `).join('');

  document.getElementById('nn-list').innerHTML = NN.map((n, i) => `
    <div class="nn-item ${blocked[i] ? 'blocked' : ''}" onclick="toggleBlocked(${i})">
      <div class="nn-dot"></div>
      <span class="nn-text">${n}</span>
      <span class="nn-x">✕</span>
    </div>
  `).join('');

  // status
  const box = document.getElementById('status-box');
  const anyBlocked = blocked.some(Boolean);
  const allSteps   = steps.every(Boolean);

  if (anyBlocked) {
    box.className = 'status blocked-st';
    box.textContent = '⛔ No trade';
  } else if (allSteps) {
    box.className = 'status ' + setup.readyClass;
    box.textContent = setup.readyMsg;
  } else {
    box.className = 'status waiting-st';
    const done = steps.filter(Boolean).length;
    box.textContent = done === 0 ? 'Waiting for setup...' : `Step ${done + 1} of 4...`;
  }
}

function toggleStep(i) {
  steps[i] = !steps[i];
  save('steps_' + side, steps);
  render(); showToast();
}

function toggleBlocked(i) {
  blocked[i] = !blocked[i];
  save('blocked', blocked);
  render(); showToast();
}

function resetAll() {
  steps   = [false,false,false,false];
  blocked = [false,false,false];
  save('steps_' + side, steps);
  save('blocked', blocked);
  render(); showToast();
}

let toastTimer;
function showToast() {
  const el = document.getElementById('toast');
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = '0', 1200);
}

render();
</script>
