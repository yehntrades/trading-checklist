<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YehnTrades — Exit Checklist</title>
<style>

/* Back navigation button */
.back-button{
  display:block;
  width:100%;
  max-width:480px;
  margin-top:32px;
  margin-bottom:28px;
  padding:14px;
  text-align:center;
  text-decoration:none;
  font-family:Georgia, serif;
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#f0d98a;
  border:1px solid #2a2010;
  border-radius:8px;
  background:#0d0b08;
  transition:all .2s ease;
}

.back-button:hover{
  background:#121008;
  border-color:#e6c874;
  box-shadow:0 0 12px rgba(230,200,116,0.15);
  transform:translateY(-1px);
}

.logo {
  width:110px;
  max-width:35vw;
  margin-bottom:12px;
  display:block;
}

</style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080808;
    color: #e0d4b8;
    font-family: Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  .brand-sub {
    font-size: 10px;
    letter-spacing: 5px;
    color: #3a3020;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* PAIR INPUT */
  .pair-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 28px;
    position: relative;
  }

  .pair-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: #4a4030;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .pair-input {
    width: 100%;
    background: #0d0b08;
    border: 1px solid #2a2010;
    border-radius: 6px;
    padding: 12px 16px;
    color: #c9a84c;
    font-size: 16px;
    font-family: Georgia, serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }

  .pair-input:focus { border-color: #c9a84c40; }
  .pair-input::placeholder { color: #2a2010; letter-spacing: 3px; }

  /* BUY / SELL TOGGLE */
  .side-toggle {
    display: flex;
    border: 1px solid #2a2010;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 28px;
    width: 100%;
    max-width: 480px;
  }

  .side-btn {
    flex: 1;
    padding: 14px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    letter-spacing: 4px;
    font-family: Georgia, serif;
    transition: all 0.2s;
    color: #3a3020;
  }

  .side-btn.buy.active  { background: rgba(92,184,92,0.12);  color: #5cb85c; }
  .side-btn.sell.active { background: rgba(224,92,92,0.12);  color: #e05c5c; }

  /* CARDS */
  .card {
    width: 100%;
    max-width: 480px;
    background: #0d0b08;
    border: 1px solid #2a2010;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .card-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid #1a1508;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .card-title { font-size: 10px; letter-spacing: 4px; color: #5a5040; text-transform: uppercase; }
  .card-hint  { font-size: 10px; color: #2a2418; font-style: italic; }

  /* STEPS */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 15px 20px;
    border-bottom: 1px solid #111008;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item.checked    { background: #0a0c08; }

  .num {
    font-size: 11px;
    color: #3a3020;
    min-width: 18px;
    padding-top: 3px;
    flex-shrink: 0;
  }

  .check-item.checked .num { color: #1e1c14; }

  .check-text {
    flex: 1;
    font-size: 14px;
    color: #a09070;
    line-height: 1.55;
    transition: all 0.15s;
  }

  .check-item.checked .check-text {
    color: #3a3020;
    text-decoration: line-through;
    text-decoration-color: #2a2010;
  }

  .box {
    width: 22px;
    height: 22px;
    border: 1px solid #2a2010;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }

  .check-item.buy.checked  .box { border-color: #5cb85c40; background: rgba(92,184,92,0.08); }
  .check-item.sell.checked .box { border-color: #e05c5c40; background: rgba(224,92,92,0.08); }

  .tick {
    font-size: 11px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .check-item.buy.checked  .tick { opacity: 1; color: #5cb85c; }
  .check-item.sell.checked .tick { opacity: 1; color: #e05c5c; }

  /* STATUS */
  .status {
    width: 100%;
    max-width: 480px;
    padding: 18px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    border-radius: 8px;
    margin-bottom: 20px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .waiting-st { background: #0d0b08; border: 1px solid #1a1508; color: #3a3020; }
  .exit-buy   { background: rgba(224,92,92,0.10); border: 1px solid rgba(224,92,92,0.25); color: #e05c5c; }
  .exit-sell  { background: rgba(224,92,92,0.10); border: 1px solid rgba(224,92,92,0.25); color: #e05c5c; }
  .hold-st    { background: rgba(92,184,92,0.08); border: 1px solid rgba(92,184,92,0.2); color: #5cb85c; }

  /* RESET */
  .reset-btn {
    background: none;
    border: 1px solid #1a1508;
    border-radius: 6px;
    color: #3a3020;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: Georgia, serif;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 32px;
  }

  .reset-btn:hover { border-color: #2a2010; color: #5a5040; }

  /* FOOTER */
  .footer-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .footer-logo {
    width: 72px;
    opacity: 0.55;
    mix-blend-mode: screen;
    flex-shrink: 0;
  }

  .footer-text {
    font-size: 9px;
    letter-spacing: 3px;
    color: #2a2010;
    text-align: right;
    line-height: 2;
    flex: 1;
  }

  .footer-rule {
    display: block;
    font-size: 11px;
    color: #c9a84c;
    font-style: italic;
    font-weight: bold;
    letter-spacing: 2px;
    margin-top: 4px;
    text-transform: none;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0d0b08;
    border: 1px solid #1a3a1a;
    color: #5cb85c;
    padding: 7px 14px;
    border-radius: 5px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  /* NAV LINK */
  .nav-link {
    font-size: 9px;
    letter-spacing: 3px;
    color: #3a3020;
    text-transform: uppercase;
    text-decoration: none;
    margin-top: 48px;
    margin-bottom: 28px;
    transition: color 0.2s;
  }
  .nav-link:hover { color: #5a5040; }

  .page-title {
    font-size: 9px;
    letter-spacing: 5px;
    color: #4a4030;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
</style>
</head>

<p class="page-title">Exit Checklist</p>
<div class="pair-wrap">
  <label class="pair-label" for="pair-input">Instrument</label>
  <input class="pair-input" id="pair-input" type="text" placeholder="XAU/USD" maxlength="10"
    oninput="savePair(this.value)" autocomplete="off" spellcheck="false">
</div>

<div class="side-toggle">
  <button class="side-btn buy active" id="btn-buy" onclick="setSide('buy')">LONG</button>
  <button class="side-btn sell" id="btn-sell" onclick="setSide('sell')">SHORT</button>
</div>

<!-- EXIT CRITERIA CARD -->
<div class="card">
  <div class="card-header">
    <span class="card-title" id="steps-title">Exit — Long</span>
    <span class="card-hint">end of day review</span>
  </div>
  <div id="steps-list"></div>
</div>

<!-- STATUS -->
<div class="status waiting-st" id="status-box">Review your trade...</div>

<!-- RESET -->
<button class="reset-btn" onclick="resetAll()">Reset</button>

<!-- FOOTER -->
<div class="footer-wrap">
  <img src="logo.png" class="logo-sm footer-logo" alt="YehnTrades">
  <div class="footer-text">
    <span class="footer-rule">Structure tells you when the trade is over</span>
  </div>
</div>

<div id="toast">✓ SAVED</div>

<script>
const EXITS = {
  buy: {
    title: 'Exit — Long',
    steps: [
      'Price made a lower high on H1 today instead of pushing to target',
      'H4 target has not been reached',
      'M15 structure has shifted bearish',
    ],
    exitMsg: '⛔ Close the trade',
    holdMsg: '✓ Hold — structure intact',
  },
  sell: {
    title: 'Exit — Short',
    steps: [
      'Price made a higher low on H1 today instead of pushing to target',
      'H4 target has not been reached',
      'M15 structure has shifted bullish',
    ],
    exitMsg: '⛔ Close the trade',
    holdMsg: '✓ Hold — structure intact',
  },
};

// ── PERSISTENCE ───────────────────────────────────────────────
function save(k, v) { try { localStorage.setItem('yt_exit_' + k, JSON.stringify(v)); } catch(e){} }
function load(k, d) { try { const v = localStorage.getItem('yt_exit_' + k); return v !== null ? JSON.parse(v) : d; } catch(e){ return d; } }

let side  = load('side', 'buy');
let steps = load('steps_' + side, [false, false, false]);
let pair  = load('pair', '');

document.getElementById('pair-input').value = pair;

function savePair(val) {
  pair = val.toUpperCase();
  save('pair', pair);
  showToast();
}

function setSide(s) {
  side  = s;
  steps = load('steps_' + s, [false, false, false]);
  save('side', s);
  render();
  showToast();
}

function render() {
  const cfg = EXITS[side];

  document.getElementById('btn-buy').className  = 'side-btn buy'  + (side === 'buy'  ? ' active' : '');
  document.getElementById('btn-sell').className = 'side-btn sell' + (side === 'sell' ? ' active' : '');
  document.getElementById('steps-title').textContent = cfg.title;

  document.getElementById('steps-list').innerHTML = cfg.steps.map((s, i) => `
    <div class="check-item ${side} ${steps[i] ? 'checked' : ''}" onclick="toggleStep(${i})">
      <span class="num">${i + 1}</span>
      <span class="check-text">${s}</span>
      <div class="box ${steps[i] ? 'ticked' : ''}"><span class="tick">✓</span></div>
    </div>
  `).join('');

  const box = document.getElementById('status-box');
  const all = steps.every(Boolean);
  const any = steps.some(Boolean);

  if (all) {
    box.className = side === 'buy' ? 'status exit-buy' : 'status exit-sell';
    box.textContent = cfg.exitMsg;
  } else if (any) {
    box.className = 'status waiting-st';
    const done = steps.filter(Boolean).length;
    box.textContent = `${done} of 3 conditions met...`;
  } else {
    box.className = 'status waiting-st';
    box.textContent = 'Review your trade...';
  }
}

function toggleStep(i) {
  steps[i] = !steps[i];
  save('steps_' + side, steps);
  render(); showToast();
}

function resetAll() {
  steps = [false, false, false];
  save('steps_' + side, steps);
  render(); showToast();
}

let toastTimer;
function showToast() {
  const el = document.getElementById('toast');
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = '0', 1200);
}

render();
</script>

<a href="checklist.html" class="back-button">← Back to Entry Checklist</a>
</body>
